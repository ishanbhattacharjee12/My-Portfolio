<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d"/>
      <stop offset="100%" stop-color="#121b2f"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  
  <!-- Neural Node Triangle (representing AI and data) -->
  <g filter="url(#glow)">
    <!-- Connections -->
    <path d="M256 160 L160 340 M256 160 L352 340 M160 340 L352 340" stroke="url(#iconGrad)" stroke-width="24" stroke-linecap="round" fill="none"/>
    
    <!-- Nodes -->
    <circle cx="256" cy="160" r="48" fill="url(#iconGrad)"/>
    <circle cx="160" cy="340" r="36" fill="url(#iconGrad)"/>
    <circle cx="352" cy="340" r="36" fill="url(#iconGrad)"/>
    
    <!-- Central inner accent -->
    <circle cx="256" cy="280" r="16" fill="#ffffff" opacity="0.8"/>
    <path d="M256 160 L256 280" stroke="#ffffff" stroke-width="8" opacity="0.6" stroke-dasharray="10, 10"/>
  </g>
</svg>
